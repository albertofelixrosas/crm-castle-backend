services:
  postgres:
    image: postgres:16-alpine
    container_name: crm-castle-postgres
    environment:
      POSTGRES_DB: crm_castle
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - crm_castle_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crm_castle"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  crm_castle_data:
