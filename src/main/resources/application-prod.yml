spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: crm
    open-in-view: false
  flyway:
    enabled: true
    default-schema: crm
    schemas: crm

server:
  port: ${PORT:8080}
