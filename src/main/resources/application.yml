spring:
  application:
    name: crm-castle-backend
  profiles:
    active: dev

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:crm-castle-super-secret-key-must-be-at-least-256-bits-long-here}
    expiration-ms: 86400000   # 24 hours
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}
